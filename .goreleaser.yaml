version: 2

project_name: dixa

before:
  hooks:
    - go test ./...

builds:
  - id: dixa
    binary: dixa
    main: ./cmd/dixa
    goos:
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X github.com/Dixa-public/dixa-cli-public/internal/cli.version={{.Version}}
  - id: dixa-installer
    binary: dixa-installer
    main: ./cmd/dixa-installer
    goos:
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{.Version}} -X main.repo=Dixa-public/dixa-cli-public

archives:
  - id: dixa-archive
    ids:
      - dixa
    formats:
      - tar.gz
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}
    format_overrides:
      - goos: windows
        formats:
          - zip
  - id: dixa-installer-binary
    ids:
      - dixa-installer
    formats:
      - binary
    name_template: >-
      {{ .Binary }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}

checksum:
  name_template: checksums.txt

release:
  prerelease: auto
  extra_files:
    - glob: .release-extra/*.pkg
    - glob: .release-extra/skill-v*.zip
  github:
    owner: Dixa-public
    name: dixa-cli-public

changelog:
  use: git
