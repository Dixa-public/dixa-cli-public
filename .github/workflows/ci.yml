name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: macos-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.2'

      - name: Run full test suite
        run: go test ./...

      - name: Build CLI binary
        run: go build ./cmd/dixa

      - name: Acceptance check - org get json
        run: go test ./internal/cli -run TestOrgGetAcceptance

      - name: Acceptance check - conversation search
        run: go test ./internal/cli -run TestConversationSearchAcceptance

      - name: Acceptance check - analytics discovery
        run: go test ./internal/cli -run TestAnalyticsPrepareMetricQueryWorkflow

      - name: Acceptance check - write safety
        run: go test ./internal/cli -run TestMutatingCommandRequiresYes
