name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.2'

      - name: Build release extra assets
        run: |
          rm -rf .release-extra
          VERSION="${GITHUB_REF_NAME#v}" OUTPUT_DIR=.release-extra ./scripts/build-macos-pkg.sh
          VERSION="${GITHUB_REF_NAME#v}" OUTPUT_DIR=.release-extra ./scripts/build-claude-skill-zip.sh

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
